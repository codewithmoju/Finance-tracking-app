    <text x="90" y="54" text-anchor="middle" fill="#FFFFFF" font-size="23" font-weight="800" font-family="Arial, sans-serif">Spending</text>
    <text x="90" y="82" text-anchor="middle" fill="#FFFFFF" font-size="23" font-weight="800" font-family="Arial, sans-serif">Insights</text>
    <text x="90" y="118" text-anchor="middle" fill="#AFC7FF" font-size="15" font-family="Arial, sans-serif">Trends and Patterns</text>
