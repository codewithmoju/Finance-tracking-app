  </defs>

  <rect width="1280" height="720" rx="36" fill="url(#bg)"/>
  <circle cx="640" cy="360" r="270" fill="#7568FF" opacity="0.08"/>
  <circle cx="180" cy="120" r="150" fill="#37E8FF" opacity="0.08"/>
  <circle cx="1110" cy="610" r="190" fill="#C33CFF" opacity="0.10"/>

  <text x="640" y="78" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="42" font-weight="900">BudgetO Finance Intelligence</text>
  <text x="640" y="115" text-anchor="middle" fill="#AFC7FF" font-family="Arial, sans-serif" font-size="19">Rule-based analysis for categories, spending behavior, income sources, and recommendations</text>

  <g transform="translate(70 255)">
