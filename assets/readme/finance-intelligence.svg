    <text x="105" y="55" fill="#FFFFFF" font-size="18" font-weight="700" font-family="Arial, sans-serif">Top categories</text>
    <text x="290" y="55" fill="#37E8FF" font-size="18" font-weight="800" font-family="Arial, sans-serif">02</text>
    <text x="335" y="55" fill="#FFFFFF" font-size="18" font-weight="700" font-family="Arial, sans-serif">Growth rate</text>
    <text x="500" y="55" fill="#37E8FF" font-size="18" font-weight="800" font-family="Arial, sans-serif">03</text>
    <text x="545" y="55" fill="#FFFFFF" font-size="18" font-weight="700" font-family="Arial, sans-serif">Recurring patterns</text>
    <text x="760" y="55" fill="#37E8FF" font-size="18" font-weight="800" font-family="Arial, sans-serif">04</text>
    <text x="805" y="55" fill="#FFFFFF" font-size="18" font-weight="700" font-family="Arial, sans-serif">Budget guidance</text>
