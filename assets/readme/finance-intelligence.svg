  <path d="M730 330H800" stroke="#76DFFF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M980 330H1030" stroke="#76DFFF" stroke-width="4" marker-end="url(#arrow)"/>

  <g transform="translate(155 505)">
