      <stop stop-color="#060E1B"/>
      <stop offset="1" stop-color="#1B0B37"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#37E8FF"/>
      <stop offset="0.5" stop-color="#7868FF"/>
